<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CajaRUS — Reconectando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; color: #101828; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid #d1d5db; border-top-color: #009767; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.25rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #6a7282; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Reconectando al servidor...</h1>
    <p>Esto toma unos segundos tras reiniciar.</p>
  </div>
  <script>
    (function () {
      var target = sessionStorage.getItem('__crs_redirect') || '/';
      sessionStorage.removeItem('__crs_redirect');
      var attempt = 0;
      var maxAttempts = 60;

      function check() {
        attempt++;
        fetch(target, { method: 'HEAD', cache: 'no-store' })
          .then(function (res) {
            if (res.ok) {
              window.location.replace(target);
            } else if (attempt < maxAttempts) {
              setTimeout(check, 1000);
            } else {
              document.querySelector('h1').textContent = 'No se pudo conectar';
              document.querySelector('p').textContent = 'Revisa que el servidor este corriendo y recarga la pagina.';
            }
          })
          .catch(function () {
            if (attempt < maxAttempts) {
              setTimeout(check, 1000);
            } else {
              document.querySelector('h1').textContent = 'No se pudo conectar';
              document.querySelector('p').textContent = 'Revisa que el servidor este corriendo y recarga la pagina.';
            }
          });
      }

      check();
    })();
  </script>
</body>
</html>
